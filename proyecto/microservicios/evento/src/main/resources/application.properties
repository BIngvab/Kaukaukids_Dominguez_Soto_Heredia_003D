# Puerto del Microservicio
server.port=8082

# Configuración de la Base de Datos MySQL (Asegúrate de tener creada la BD 'kaukaukids_db' en MySQL Workbench o phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/kaukaukids_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect